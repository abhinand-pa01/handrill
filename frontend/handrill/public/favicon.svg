<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Drill body barrel -->
  <rect x="8" y="26" width="30" height="12" rx="4" fill="white" fill-opacity="0.95"/>
  <!-- Chuck cone -->
  <path d="M38 28 L46 30 L46 34 L38 36 Z" fill="white" fill-opacity="0.85"/>
  <!-- Drill bit -->
  <rect x="46" y="31" width="12" height="2.5" rx="1.25" fill="white" fill-opacity="0.65"/>
  <!-- Handle D-grip -->
  <path d="M14 26 C14 20 18 17 22 17 C26 17 28 20 28 24 L28 26 Z" fill="white" fill-opacity="0.92"/>
  <!-- Grip lines -->
  <line x1="17" y1="20.5" x2="17" y2="25.5" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="21" y1="18.5" x2="21" y2="25.5" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="25" y1="19.5" x2="25" y2="25.5" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Trigger guard -->
