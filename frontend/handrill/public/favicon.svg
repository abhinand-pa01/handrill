  <circle cx="19" cy="32" r="1.5" fill="#1E3A8A" fill-opacity="0.25"/>
  <circle cx="24" cy="32" r="1.5" fill="#1E3A8A" fill-opacity="0.25"/>
  <circle cx="29" cy="32" r="1.5" fill="#1E3A8A" fill-opacity="0.25"/>
  <!-- Bit spiral lines -->
  <line x1="50" y1="30.5" x2="55" y2="30.5" stroke="white" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="52" y1="33.5" x2="57" y2="33.5" stroke="white" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="60%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
