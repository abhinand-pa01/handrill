spring:
  config:
    activate:
      on-profile: docker
  threads:
    virtual:
      enabled: true
  datasource:

    url: jdbc:postgresql://<HOST>:<PORT>/<DB_NAME>
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
app:
  cors:
    allowed-origins:
      - http://localhost
      - http://frontend
