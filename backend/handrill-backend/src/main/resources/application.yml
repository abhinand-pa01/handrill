server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: handrill
  threads:
    virtual:
      enabled: true
  datasource:

    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:

    secret: ${JWT_SECRET}

    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://localhost
      - https://handrill-bb4nozvbj-abhinand-pa01s-projects.vercel.app

logging:
  level:
    com.abhinand.handrill: INFO
    org.springframework.security: WARN
